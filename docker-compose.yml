services:
  backend:
    build: .
    container_name: futbol-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      # ✅ CORRECCIÓN ERROR 4 (RED INTERNA): DATABASE_URL apunta a db_futbol dentro de la red del contenedor.
      - DATABASE_URL=postgresql://postgres:password123@db_futbol:5432/futbol_db
    depends_on:
      - db_futbol

  db_futbol:
    image: postgres:15-alpine
    container_name: futbol-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: futbol_db
    ports:
      - "5432:5432"
    volumes:
      # ✅ CORRECCIÓN ERROR 5 (VOLÚMENES): Ruta corregida a /var/lib/postgresql/data
      # Estaba como /data/db que es la ruta de MongoDB, no de PostgreSQL.
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
