name: CI - FutbolStats Pro

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    # ✅ CORRECCIÓN ERROR 6 (CI): Se agregó servicio PostgreSQL temporal para que
    # los tests tengan una base de datos real disponible durante el pipeline.
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: futbol_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # ✅ CORRECCIÓN ERROR 6 (CI): Se cambió 'npm install' por 'npm ci'
      # que es el comando correcto para entornos de integración continua.
      - name: Instalar dependencias
        run: npm ci

      # ✅ CORRECCIÓN ERROR 6 (CI): Se inyectan NODE_ENV=test y DATABASE_URL.
      # Sin NODE_ENV=test el guard del test lanza error de seguridad.
      # DATABASE_URL apunta a localhost porque GitHub Actions mapea el puerto ahí.
      - name: Correr tests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:password123@localhost:5432/futbol_db
        run: npm test
