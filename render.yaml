services:
  - type: web
    name: futbol-stats-pro
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildCommand: npm ci
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: futbol-stats-db
          property: connectionString

databases:
  - name: futbol-stats-db
    databaseName: futbol_db
    region: oregon
    plan: free
